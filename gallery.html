<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiernan Grillo | Production Gallery</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #66fcf1;
            --text-color: #c5c6c7;
            --heading-color: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            color: var(--text-color); 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-color); 
        }
        header { 
            background-color: #151922; 
            padding: 2.5rem 0; 
            text-align: center; 
            border-bottom: 2px solid var(--container-bg); 
        }
        h1 { 
            margin: 0; 
            color: var(--heading-color); 
            font-size: 2.5rem;
            letter-spacing: 1px;
        }
        .subtitle {
            color: var(--accent-color);
            margin: 0.5rem 0 1.5rem 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        nav a { 
            margin: 0 1.2rem; 
            color: var(--text-color); 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.3s;
        }
        nav a:hover { 
            color: var(--accent-color); 
        }
        .container { 
            max-width: 900px; 
            margin: 2.5rem auto; 
            padding: 2.5rem; 
            background: var(--container-bg); 
            border-radius: 6px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        h2 { 
            color: var(--heading-color);
            border-bottom: 2px solid var(--accent-color); 
            padding-bottom: 0.5rem; 
            margin-top: 0;
        }
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 1.5rem; 
            margin-top: 1.5rem; 
        }
        .gallery-item { 
            background: #151922; 
            height: 200px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 4px; 
            color: var(--text-color);
            border: 1px solid #2c3848; 
            transition: border-color 0.3s;
        }
        .gallery-item:hover {
            border-color: var(--accent-color);
        }
        footer { 
            text-align: center; 
            padding: 3rem 0; 
            color: #45f3ff; 
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <h1>Kiernan Grillo</h1>
        <div class="subtitle">Production Gallery</div>
        <nav>
              <a href="index.html">Overview</a>
              <a href="about.html">About Me</a>
              <a href="resume.html">Resume</a>
              <a href="gallery.html">Production Gallery</a>
              <a href="index.html#contact">Connect</a>
</nav>
        </nav>
    </header>

    <div class="container">
        <h2>Design Showcase</h2>
        <p>A collection of my lighting design work and production photography.</p>
        <div class="gallery-grid">
<div class="gallery-item">
                <img src="626804168_1388798989708509_5247564175030279874_n.jpg" alt="NDWH-Curtains Winter of 2025">
            <div class="gallery-item">Photo 2</div>
            <div class="gallery-item">Photo 3</div>
            <div class="gallery-item">Photo 4</div>
            <div class="gallery-item">Photo 5</div>
            <div class="gallery-item">Photo 6</div>
        
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Kiernan Grillo. Built for Professional Stagecraft.</p>
    </footer>

</body>
</html>
