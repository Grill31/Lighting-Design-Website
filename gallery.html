<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Gallery</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f9f9f9; }
        header { background-color: #fff; padding: 2rem 0; text-align: center; border-bottom: 1px solid #ddd; }
        h1 { margin: 0; color: #111; }
        nav { margin-top: 1rem; }
        nav a { margin: 0 1rem; color: #555; text-decoration: none; font-weight: 600; }
        nav a:hover { color: #000; }
        .container { max-width: 960px; margin: 2rem auto; padding: 0 1rem; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #333; padding-bottom: 0.5rem; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .gallery-item { background: #eee; height: 200px; display: flex; align-items: center; justify-content: center; border-radius: 4px; color: #777; }
        footer { text-align: center; padding: 2rem 0; color: #777; }
    </style>
</head>
<body>

    <header>
        <h1>Portfolio Gallery</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="index.html#resume">About & Resume</a>
            <a href="gallery.html">Portfolio</a>
            <a href="index.html#contact">Contact</a>
        </nav>
    </header>

    <div class="container">
        <h2>Design Showcase</h2>
        <p>A collection of my lighting design work and production photography.</p>
        <div class="gallery-grid">
            <div class="gallery-item">Photo 1</div>
            <div class="gallery-item">Photo 2</div>
            <div class="gallery-item">Photo 3</div>
            <div class="gallery-item">Photo 4</div>
            <div class="gallery-item">Photo 5</div>
            <div class="gallery-item">Photo 6</div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 [Your Name]. All Rights Reserved.</p>
    </footer>

</body>
</html>
