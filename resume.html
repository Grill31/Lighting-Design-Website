<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiernan Grillo | Professional Resume</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #66fcf1;
            --text-color: #c5c6c7;
            --heading-color: #ffffff;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden; /* Prevents double scrollbars on the main page */
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex;
            flex-direction: column;
        }
        header { 
            background-color: #151922; 
            padding: 1.5rem 0; 
            text-align: center; 
            border-bottom: 2px solid var(--container-bg); 
            flex-shrink: 0; /* Keeps the header from squishing */
        }
        h1 { 
            margin: 0; 
            color: var(--heading-color); 
            font-size: 2rem;
            letter-spacing: 1px;
        }
        .subtitle {
            color: var(--accent-color);
            margin: 0.3rem 0 1rem 0;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        nav a { 
            margin: 0 1.2rem; 
            color: var(--text-color); 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.3s;
        }
        nav a:hover { 
            color: var(--accent-color); 
        }
        .resume-view-container {
            flex-grow: 1; /* Automatically stretches to fill the remaining screen height */
            width: 100%;
            background-color: #525659; /* Standard PDF viewer background color */
        }
        .resume-view-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <header>
        <h1>Kiernan Grillo</h1>
        <div class="subtitle">Technical Theater Resume</div>
        <nav>
            <a href="index.html">Overview</a>
            <a href="resume.html">Resume</a>
            <a href="gallery.html">Production Gallery</a>
            <a href="index.html#contact">Connect</a>
        </nav>
    </header>

    <div class="resume-view-container">
        <iframe src="./resume.pdf"></iframe>
    </div>

</body>
</html>
